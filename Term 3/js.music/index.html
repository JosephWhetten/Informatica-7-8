<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Joseph
        </title>
        <script src="script.js"></script>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <h1>
            Music Box
        </h1>
        <main>
            <div class="buttons">
                <div id="kick" class="instrument" >
                    <h2>A</h2>
                    <p>Kick</p>
                </div>
                <div id="snare" class="instrument">
                    <h2>S</h2>
                    <p>Snare</p>
                </div>
                <div id="tom" class="instrument">
                    <h2>D</h2>
                    <p>Tom</p>
                </div>
                <div id="clap" class="instrument">
                    <h2>F</h2>
                    <p>Clap</p>
                </div>
                <div id="hihat" class="instrument">
                    <h2>G</h2>
                    <p>Hihat</p>
                </div>
                <div id="openhat" class="instrument">
                    <h2>H</h2>
                    <p>Openhat</p>
                </div>
                <div id="bruh" class="instrument">
                    <h2>B</h2>
                    <p>Bruh</p>
                </div>
                <div id="oof" class="instrument">
                    <h2>O</h2>
                    <p>Oof</p>
                </div>
            </div>
            </main>
