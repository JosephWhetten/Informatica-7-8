<!DOCTYPE html>
<html lang="en">
    <head>
        <title>

        </title>
        <!--This gives every element <p> the same attributes-->

            p {
                color:red;
                text-align:center;
            }
        </style>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <h2>
            My name is Joseph
        </h2>
        <p>

        </p>
        <h3 style="color:blue;">
            This is another title
        </h3>
        <p>
            This is going to be another paragraph
        </p>
    </body>
</html>
